name: CI Pipeline

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 1: GATE CHECK (Blocking) ❌
  # Hard blockers – pipeline stops here if security audit or build fails.
  # ─────────────────────────────────────────────────────────────────────────────
  gate:
    name: Gate Check (Audit + Build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit (production dependencies)
        run: npm audit --omit=dev

      - name: Build verification
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next
          retention-days: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 2: CODE QUALITY (Non-blocking) ⚠️
  # Reports issues but does not stop the pipeline.
  # ─────────────────────────────────────────────────────────────────────────────
  quality:
    name: Code Quality (Lint + TypeScript)
    runs-on: ubuntu-latest
    needs: gate

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Run TypeScript type check
        run: npx tsc --noEmit
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 3: UNIT TESTS (Progressive) 📊
  # Runs all unit tests and uploads coverage report as an artifact.
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: gate

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          retention-days: 14