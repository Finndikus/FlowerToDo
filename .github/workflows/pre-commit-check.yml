name: Pre-Commit Check (Buildability)


# Triggered manually only.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    name: Pre-Commit Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build check (mirrors .husky/pre-commit)
        run: npm run build
